version: '3.8'

services:
  # AgentWork 主服务 - 生产环境
  agentwork:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: agentwork-prod
    restart: always
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - CONFIG_PATH=/app/config.yaml
      # 生产环境变量 (通过 .env 文件管理)
      - API_KEY=${API_KEY:-}
      - DATABASE_URL=${DATABASE_URL:-}
      - REDIS_URL=redis://redis:6379
    volumes:
      # 数据持久化
      - agentwork-data:/app/data
      # 日志持久化
      - agentwork-logs:/app/logs
      # 配置文件 (可选)
      - ./config.prod.yaml:/app/config.yaml:ro
    networks:
      - agentwork-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('healthy')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    # 资源限制 (可选)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Redis 服务 - 生产环境
  redis:
    image: redis:7-alpine
    container_name: agentwork-redis-prod
    restart: always
    # 生产环境不暴露端口到外部
    # ports:
    #   - "6379:6379"
    volumes:
      - redis-data:/data
      # 持久化 Redis 配置
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - agentwork-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

volumes:
  agentwork-data:
    driver: local
  agentwork-logs:
    driver: local
  redis-data:
    driver: local

networks:
  agentwork-network:
    driver: bridge
