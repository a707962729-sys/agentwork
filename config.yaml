# AgentWork 配置文件

# 平台设置
platform:
  name: "AgentWork"
  version: "1.0.0"

# 路径配置
paths:
  workspace: "~/.agentwork"
  skills: "./skills"
  workflows: "./workflows"
  agents: "./agents"
  memory: "~/.agentwork/memory"
  data: "./data"

# 数据库配置
database:
  type: "sqlite"
  path: "./data/agentwork.db"

# AI 模型配置 - 独立运行使用
ai:
  # 默认使用的提供商
  default: "ollama"
  
  # API 提供商配置
  providers:
    # 本地模型（Ollama）- 优先使用
    ollama:
      api_base: "http://localhost:11434/v1"
      model: "qwen2.5:7b"
      api_key: "ollama"
      
    # 智谱 GLM
    glm:
      api_base: "https://open.bigmodel.cn/api/paas/v4"
      model: "glm-5"
      # api_key 从环境变量 ZHIPU_API_KEY 或 AI_API_KEY 读取
      
    # OpenAI 兼容接口
    openai:
      api_base: "${OPENAI_API_BASE:https://api.openai.com/v1}"
      model: "gpt-4o-mini"
      # api_key 从环境变量 OPENAI_API_KEY 读取

# 执行配置
execution:
  mode: "sequential"
  checkpointEnabled: true
  maxRetries: 3
  timeout: 3600

# 日志配置
logging:
  level: "info"
  file: "./logs/agentwork.log"